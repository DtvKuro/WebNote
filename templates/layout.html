<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="{{BASE_PATH}}images/asfalt-light.png" as="image">
  <link rel="preload" href="{{BASE_PATH}}images/asfalt-dark.png" as="image">
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);window.addEventListener('pageshow',function(e){if(e.persisted)document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')})})();</script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%237c3aed'/><text x='16' y='23' font-family='Arial' font-weight='bold' font-size='20' fill='white' text-anchor='middle'>P</text></svg>">
  <title>{{PAGE_TITLE}}</title>
  <link rel="stylesheet" href="{{BASE_PATH}}css/style.css">
</head>
<body data-page-type="{{PAGE_TYPE}}">
  <div class="progress-bar" id="progressBar"></div>
  <nav class="nav">
    <div class="nav-container">
      {{NOTES_MENU_TOGGLE}}
      <a href="{{BASE_PATH}}index.html" class="nav-logo">Pronote</a>
      <div class="nav-search" id="navSearch">
        <input type="text" class="nav-search-input" id="searchInput" placeholder="Search..." aria-label="Search">
        <div class="search-nav-panel" id="searchNavPanel" style="display:none">
          <span id="searchMatchInfo"></span>
          <button class="search-nav-btn" id="searchPrevBtn" aria-label="Previous match">&uarr;</button>
          <button class="search-nav-btn" id="searchNextBtn" aria-label="Next match">&darr;</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <div class="notes-menu-overlay"></div>
  <aside class="notes-menu">
    <div class="notes-menu-header">
      <h3>All Notes</h3>
      <button class="notes-menu-close" aria-label="Close menu">&times;</button>
    </div>
    <div class="notes-menu-body">
      {{NOTES_MENU}}
    </div>
  </aside>

  <main class="main">
    <div class="skeleton-loader" id="skeletonLoader">
      <div class="skeleton-bar skeleton-bar--title"></div>
      <div class="skeleton-bar skeleton-bar--text"></div>
      <div class="skeleton-bar skeleton-bar--text skeleton-bar--short"></div>
      <div class="skeleton-bar skeleton-bar--text"></div>
    </div>
    {{CONTENT}}
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p class="footer-copyright">{{COPYRIGHT}}</p>
      <div class="footer-social">
        <a href="{{SOCIAL_INSTAGRAM}}" target="_blank" rel="noopener" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>
        <a href="{{SOCIAL_GITHUB}}" target="_blank" rel="noopener" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        </a>
        <a href="{{SOCIAL_FACEBOOK}}" target="_blank" rel="noopener" aria-label="Facebook">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="{{BASE_PATH}}js/main.js"></script>
</body>
</html>
